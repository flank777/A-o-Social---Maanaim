     ESTILOS DO COMPONENTE FOOTER
     Complementam o global.css com estilos das logos reais.
═══════════════════════════════════════════════════════════════════ -->
<style> /* ── Container das logos das organizações (coluna 1) ─────── */
  .footer-brand-row {
    display:     flex;
    align-items: center;
    gap:         20px;
    margin-bottom: 20px;
    flex-wrap:   wrap;
  }

  /* ── Item de logo (imagem + textos) ─────────────────────── */
  .footer-brand-item {
    display:     flex;
    align-items: center;
    gap:         12px;
  }

  /* Container base da logo no footer */
  .footer-brand-img {
    overflow:    hidden;
    flex-shrink: 0;
    border:      1.5px solid rgba(255, 255, 255, 0.10);
  }

  /* Semear — retrato */
  .footer-brand-item.semear .footer-brand-img {
    width:         34px;
    height:        50px;
    border-radius: 6px;
    background:    #ffffff;
    border-color:  rgba(125, 192, 99, 0.25);
  }

  /* Maanaim — circular */
  .footer-brand-item.maanaim .footer-brand-img {
    width:         48px;
    height:        48px;
    border-radius: 50%;
    background:    #f5f0e8;
    border-color:  rgba(232, 201, 106, 0.25);
  }

  /* Imagem dentro dos containers */
  .footer-brand-img img {
    width:      100%;
    height:     100%;
    object-fit: contain;
    display:    block;
  }

  /* ── Textos ao lado da logo ─────────────────────────────── */
  .footer-brand-texts {
    display:        flex;
    flex-direction: column;
    gap:            2px;
  }

  .footer-brand-texts strong {
    font-family: var(--ff-display);
    font-size:   0.85rem;
    font-weight: 700;
    color:       var(--cream);
    display:     block;
  }

  .footer-brand-texts span {
    font-family:    var(--ff-mono);
    font-size:      0.60rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display:        block;
  }

  .footer-brand-item.semear  .footer-brand-texts span { color: var(--sage2, #7dc063); }
  .footer-brand-item.maanaim .footer-brand-texts span { color: var(--gold); }

  /* Separador × entre as logos */
  .footer-brand-sep {
    font-family: var(--ff-mono);
    font-size:   0.75rem;
    color:       var(--border);
    flex-shrink: 0;
  }

  /* ── Selos de credibilidade ─────────────────────────────── */
  .footer-selos {
    display:    flex;
    gap:        8px;
    flex-wrap:  wrap;
    margin-top: 16px;
  }

  .footer-selo {
    display:        inline-flex;
    align-items:    center;
    gap:            5px;
    font-family:    var(--ff-mono);
    font-size:      0.60rem;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color:          var(--text2);
    border:         1px solid var(--border);
    border-radius:  100px;
    padding:        4px 10px;
    transition:     border-color 0.2s ease, color 0.2s ease;
  }

  .footer-selo i {
    color:     var(--gold);
    font-size: 0.60rem;
  }

  .footer-selo:hover {
    border-color: rgba(232, 201, 106, 0.30);
    color:        var(--cream);
  }

  /* Redes sociais: sempre centralizadas */
  .footer-social-col {
    width: 100%;
    text-align: center;
  }
  .footer-social {
    display: flex !important;
    flex-direction: row !important;
    flex-wrap: nowrap !important;
    justify-content: center !important;
    align-items: center !important;
    gap: 32px !important;
    width: 100% !important;
    padding: 0 !important;
    margin: 0 auto !important;
    list-style: none !important;
  }
  .footer-social li {
    display: flex !important;
    justify-content: center !important;
  }
  .footer-social a {
    display: flex !important;
    flex-direction: column !important;
    align-items: center !important;
    gap: 5px !important;
    font-size: 0.65rem !important;
  }
  .footer-social i {
    font-size: 1.4rem !important;
  }

</style> <!-- ═══════════════════════════════════════════════════════════════════
     FOOTER — Rodapé Principal
═══════════════════════════════════════════════════════════════════ -->

      </a> </div><!-- fim .footer-bottom --> </div><!-- fim .container -->
</footer><!-- fim #footer --> <!-- ═══════════════════════════════════════════════════════════════════

</button> <!-- Toast de Notificação (app.js expõe window.showToast()) -->

</div>
