<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Admin | Ação Social Semear</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
    <link rel="dns-prefetch" href="https://www.gstatic.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
          rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" /></noscript>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
          crossorigin="anonymous" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" /></noscript>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <link rel="stylesheet" href="css/admin-modern.css?v=9" />
  </head>
  <body class="admin-modern">
    <section id="login-screen" class="admin-login" aria-label="Login administrativo">
      <form id="admin-login-form" class="admin-login-card">
        <div class="admin-login-brand">
          <img src="img/logo-semear-oficial.jpeg"
               class="admin-login-logo-img"
               alt="Logo Ação Social Semear" />
          <span>
            <span class="admin-brand-kicker">Ação Social</span>
            <span class="admin-brand-name">Semear</span>
            <span class="admin-brand-city">Belém • PA</span>
          </span>
        </div>
        <h1 class="admin-login-title">Painel Administrativo</h1>
        <p class="admin-login-sub">Acesso restrito para acompanhamento de doações, famílias, orações e tarefas.</p>
        <label class="admin-field">
          <span>E-mail</span>
          <input id="admin-login-email" class="admin-input" type="email" autocomplete="username" placeholder="admin@semear.org.br" required />
        </label>
        <label class="admin-field">
          <span>Senha</span>
          <input id="admin-login-password" class="admin-input" type="password" autocomplete="current-password" placeholder="Digite sua senha" required />
        </label>
        <div id="admin-login-error" class="admin-login-error" role="alert"></div>
        <button class="admin-button primary block" type="submit">
          <i class="fa-solid fa-shield-halved"></i>
          Entrar no painel
        </button>
      </form>
    </section>

    <div id="admin-app" class="admin-app">
      <aside id="admin-sidebar" class="admin-sidebar" aria-label="Navegacao lateral"></aside>

      <main class="admin-main">
        <header class="admin-topbar">
          <button id="admin-menu-button" class="admin-icon-button admin-mobile-toggle" type="button" aria-label="Abrir menu">
            <i class="fa-solid fa-bars"></i>
          </button>
          <div class="admin-page-title">
            <h1 id="admin-page-heading">Painel Administrativo</h1>
            <p id="admin-page-subheading">Ação Social Semear • Belém, PA</p>
          </div>
          <label class="admin-topbar-search" aria-label="Buscar">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input id="admin-search" class="admin-input" type="search" placeholder="Buscar..." />
          </label>
          <div class="admin-topbar-actions">
            <button class="admin-icon-button" type="button" aria-label="Notificacoes">
              <i class="fa-regular fa-bell"></i>
              <span class="admin-bell-badge">12</span>
            </button>
            <div class="admin-user-chip">
              <span class="admin-avatar"><i class="fa-solid fa-user"></i></span>
              <span>
                <strong>Administrador</strong>
                <span>admin@semear.org.br</span>
              </span>
            </div>
          </div>
        </header>

        <section id="admin-view"></section>
      </main>

      <nav id="admin-mobile-nav" class="admin-mobile-nav" aria-label="Navegacao mobile"></nav>
    </div>

    <div id="admin-toast" class="admin-toast" role="status" aria-live="polite"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="js/services/cloudflare-r2.js?v=1"></script>
    <script src="js/services/cloudinary.js?v=1"></script>
    <script src="js/services/firebase.js?v=5"></script>
    <script src="js/api.js?v=5"></script>
    <script src="js/admin-modern.js?v=14"></script>
  </body>
</html>
