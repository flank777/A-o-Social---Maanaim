<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="robots" content="noindex,nofollow" />
    <title>Super Admin · DoaVida</title>

    <!-- Google Fonts (mesma família do projeto) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- Ícones -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <!-- Variáveis e reset herdados do site -->
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/super-admin.css" />

    <link rel="icon" type="image/jpeg" href="logo-semear.jpeg" />
  </head>
  <body class="sa-body" data-state="boot">
    <!-- ════════════════════════════════════════════════════════════════
       BOOT SCREEN — exibido enquanto o app verifica a sessão
       ════════════════════════════════════════════════════════════════ -->
    <div
      id="sa-boot"
      class="sa-boot"
      aria-hidden="false"
      role="status"
      aria-live="polite"
    >
      <div class="sa-boot__core">
        <div class="sa-boot__ring" aria-hidden="true"></div>
        <img class="sa-boot__logo" src="logo-semear.jpeg" alt="" />
      </div>
      <div class="sa-boot__label">Carregando central de controle…</div>
    </div>

    <!-- ════════════════════════════════════════════════════════════════
       LOGIN — visível somente quando não há sessão válida
       ════════════════════════════════════════════════════════════════ -->
    <main id="sa-login" class="sa-login" hidden>
      <section class="sa-login__card" aria-labelledby="sa-login-title">
        <header class="sa-login__head">
          <img src="logo-semear.jpeg" alt="" class="sa-login__logo" />
          <div>
            <h1 id="sa-login-title" class="sa-login__title">Super Admin</h1>
            <p class="sa-login__sub">Central de controle DoaVida</p>
          </div>
        </header>

        <form id="sa-login-form" class="sa-login__form" novalidate>
          <label class="sa-field">
            <span class="sa-field__label">E-mail</span>
            <input
              id="sa-login-email"
              type="email"
              autocomplete="username"
              required
              placeholder="seu@email.com"
              class="sa-field__input"
            />
          </label>

          <label class="sa-field">
            <span class="sa-field__label">Senha</span>
            <span class="sa-field__wrap">
              <input
                id="sa-login-password"
                type="password"
                autocomplete="current-password"
                required
                minlength="6"
                placeholder="••••••••"
                class="sa-field__input"
              />
              <button
                type="button"
                id="sa-login-toggle"
                class="sa-field__toggle"
                aria-label="Mostrar senha"
              >
                <i class="fa-regular fa-eye" aria-hidden="true"></i>
              </button>
            </span>
          </label>

          <p
            id="sa-login-error"
            class="sa-login__error"
            role="alert"
            hidden
          ></p>

          <button
            id="sa-login-submit"
            type="submit"
            class="sa-btn sa-btn--primary sa-btn--lg"
          >
            <i class="fa-solid fa-lock" aria-hidden="true"></i>
            <span>Entrar com segurança</span>
          </button>

          <p class="sa-login__hint">
            Acesso restrito ao dono do sistema. Tentativas são registradas.
          </p>
        </form>
      </section>
    </main>

    <!-- ════════════════════════════════════════════════════════════════
       APP — painel completo (sidebar + topbar + conteúdo)
       ════════════════════════════════════════════════════════════════ -->
    <div id="sa-app" class="sa-app" hidden>
      <!-- Sidebar -->
      <aside class="sa-side" id="sa-side" aria-label="Navegação principal">
        <header class="sa-side__head">
          <img src="logo-semear.jpeg" alt="" class="sa-side__logo" />
          <div class="sa-side__brand">
            <strong>Super Admin</strong>
            <small>DoaVida</small>
          </div>
          <button
            class="sa-side__close"
            id="sa-side-close"
            aria-label="Fechar menu"
          >
            <i class="fa-solid fa-xmark" aria-hidden="true"></i>
          </button>
        </header>

        <nav class="sa-nav" id="sa-nav" aria-label="Seções do painel">
          <!-- Itens injetados por js/super-admin/ui/layout.js -->
        </nav>

        <footer class="sa-side__foot">
          <div class="sa-side__user" id="sa-side-user">
            <i class="fa-solid fa-circle-user" aria-hidden="true"></i>
            <span id="sa-side-user-name">—</span>
          </div>
          <button class="sa-side__logout" id="sa-logout" type="button">
            <i class="fa-solid fa-right-from-bracket" aria-hidden="true"></i>
            <span>Sair</span>
          </button>
        </footer>
      </aside>

      <!-- Topbar + conteúdo -->
      <div class="sa-main">
        <header class="sa-top">
          <button
            class="sa-top__menu"
            id="sa-side-toggle"
            aria-label="Abrir menu"
            aria-controls="sa-side"
          >
            <i class="fa-solid fa-bars" aria-hidden="true"></i>
          </button>

          <div class="sa-top__crumbs" id="sa-crumbs" aria-live="polite">
            <span>Visão Geral</span>
          </div>

          <div class="sa-top__actions">
            <span class="sa-pill sa-pill--draft" id="sa-draft-pill" hidden>
              <i class="fa-solid fa-pen" aria-hidden="true"></i> Rascunho ativo
            </span>
            <button
              class="sa-btn sa-btn--ghost"
              id="sa-history-open"
              type="button"
              title="Histórico"
            >
              <i class="fa-solid fa-clock-rotate-left" aria-hidden="true"></i>
            </button>
            <button
              class="sa-btn sa-btn--ghost"
              id="sa-help"
              type="button"
              title="Ajuda"
            >
              <i class="fa-regular fa-circle-question" aria-hidden="true"></i>
            </button>
          </div>
        </header>

        <section class="sa-view" id="sa-view" tabindex="-1">
          <!-- View atual injetada pelos módulos js/super-admin/views/*.js -->
        </section>
      </div>
    </div>

    <!-- Toast container (pub/sub via store) -->
    <div
      id="sa-toast-stack"
      class="sa-toast-stack"
      aria-live="polite"
      aria-atomic="false"
    ></div>

    <!-- Backdrop modal -->
    <div id="sa-backdrop" class="sa-backdrop" hidden></div>

    <!-- ────────────── Bibliotecas ────────────── -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script src="js/services/supabase.js"></script>

    <!-- ────────────── Núcleo do Super Admin ────────────── -->
    <script src="js/super-admin/core/store.js"></script>
    <script src="js/super-admin/core/auth.js"></script>
    <script src="js/super-admin/core/api.js"></script>
    <script src="js/super-admin/core/history.js"></script>
    <script src="js/super-admin/core/publish.js"></script>
    <script src="js/super-admin/core/router.js"></script>
    <script src="js/super-admin/ui/layout.js"></script>
    <script src="js/super-admin/ui/preview.js"></script>
    <script src="js/super-admin/ui/widget-renderer.js"></script>
    <script src="js/super-admin/ui/command-runtime.js"></script>
    <script src="js/super-admin/views/overview.js"></script>
    <script src="js/super-admin/views/pages.js"></script>
    <script src="js/super-admin/views/page-detail.js"></script>
    <script src="js/super-admin/views/section-detail.js"></script>
    <script src="js/super-admin/views/media-library.js"></script>
    <script src="js/super-admin/views/forms.js"></script>
    <script src="js/super-admin/views/form-detail.js"></script>
    <script src="js/super-admin/views/dashboards.js"></script>
    <script src="js/super-admin/views/dashboard-detail.js"></script>
    <script src="js/super-admin/views/widget-detail.js"></script>
    <script src="js/super-admin/views/presets.js"></script>
    <script src="js/super-admin/views/loading-page.js"></script>
    <script src="js/super-admin/views/fonts.js"></script>
    <script src="js/super-admin/views/colors.js"></script>
    <script src="js/super-admin/views/texts.js"></script>
    <script src="js/super-admin/views/receipts.js"></script>
    <script src="js/super-admin/views/agent.js"></script>
    <script src="js/super-admin/views/commands.js"></script>
    <script src="js/super-admin/views/history.js"></script>
    <!-- Editor Manual -->
    <script src="js/super-admin/content-manifest.js"></script>
    <script src="js/super-admin/core/importer.js"></script>
    <script src="js/super-admin/views/manual-editor.js"></script>
    <script src="js/super-admin/bootstrap.js"></script>
  </body>
</html>
